name: Bandit Security Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  bandit-security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      issues: write

    steps:
    - name: Check out the repository
      uses: actions/checkout@v5

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Poetry
      run: |
        python -m pip install --upgrade pip
        pip install poetry

    - name: Install project + dev deps
      run: poetry install --with dev --no-interaction

    - name: Bandit Scan
      uses: shundor/python-bandit-scan@9cc5aa4a006482b8a7f91134412df6772dbda22c
      with:
        exit_zero: true
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Tests rely on pytest's `assert`, so exclude them and skip B101.
        excluded_paths: 'tests'
        skips: 'B101'

    - name: Reconcile GitHub Issues with SARIF findings
      if: github.event_name != 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const sarifPath = 'results.sarif';
          if (!fs.existsSync(sarifPath)) {
            core.setFailed('SARIF file does not exist; refusing to reconcile issues.');
            return;
          }
          const sarif = JSON.parse(fs.readFileSync(sarifPath));
          const { owner, repo } = context.repo;

          const currentFindings = new Map();
          for (const result of sarif.runs[0].results || []) {
            const title = `[Security] ${result.ruleId}: ${result.message.text}`;
            const body = `## Issue Description\n- **Severity**: ${result.level}\n- **Path**: ${result.locations[0].physicalLocation.artifactLocation.uri}\n- **Line**: ${result.locations[0].physicalLocation.region.startLine}\n\nPlease address this issue as soon as possible.`;
            currentFindings.set(title, body);
          }

          const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
            owner,
            repo,
            state: 'open',
            labels: 'security',
            per_page: 100,
          });
          const existingTitles = new Set(existingIssues.map(issue => issue.title));

          for (const [title, body] of currentFindings) {
            if (existingTitles.has(title)) {
              console.log(`Issue "${title}" already exists. Not opening a new one.`);
              continue;
            }
            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['security'],
            });
          }

          for (const issue of existingIssues) {
            if (currentFindings.has(issue.title)) continue;
            console.log(`Closing resolved security issue #${issue.number}: ${issue.title}`);
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: `Closed automatically: this finding no longer appears in the latest Bandit scan (commit ${context.sha}).`,
            });
            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issue.number,
              state: 'closed',
              state_reason: 'completed',
            });
          }
